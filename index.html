<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<style>
body {
  margin: 0;
  background: url("fondo.jpg") no-repeat center center fixed;
  background-size: cover;
  font-family: Arial;
  overflow: hidden;
}

/* Iconos */
.icono {
  width: 80px;
  text-align: center;
  color: white;
  cursor: pointer;
  position: absolute;
}

.icono img {
  width: 64px;
}

/* Ventanas */
.ventana {
  position: absolute;
  top: 100px;
  left: 100px;
  width: 300px;
  background: rgba(255,255,255,0.7);
  border: 2px solid #00cfff;
  border-radius: 10px;
  backdrop-filter: blur(10px);
  display: none;
  padding: 10px;
}

.barra {
  font-weight: bold;
  margin-bottom: 10px;
  cursor: move;
}

/* Botón cerrar */
.cerrar {
  float: right;
  cursor: pointer;
  background: red;
  color: white;
  padding: 2px 6px;
  border-radius: 3px;
}

/* Canvas */
canvas {
  background: white;
  border: 1px solid black;
}
</style>

</head>
<body>

<!-- 🎵 Música -->
<audio id="musica" autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 💻 ICONOS -->
<div class="icono" style="top:20px; left:20px;" onclick="abrir('calc')">
  <img src="calc.png">
  <div>Calculadora</div>
</div>

<div class="icono" style="top:120px; left:20px;" onclick="abrir('txt')">
  <img src="txt.png">
  <div>Notas</div>
</div>

<div class="icono" style="top:220px; left:20px;" onclick="abrir('paint')">
  <img src="paint.png">
  <div>Paint</div>
</div>

<!-- 🕹️ NUEVO ICONO TETRIS -->
<div class="icono" style="top:320px; left:20px;" onclick="abrir('tetris')">
  <img src="tetris.png">
  <div>Tetris</div>
</div>

<!-- 🧮 CALCULADORA -->
<div id="calc" class="ventana">
  <div class="barra">
    Calculadora
    <span class="cerrar" onclick="cerrar('calc')">✖</span>
  </div>
  <input id="inputCalc" placeholder="2+2">
  <button onclick="calcular()">=</button>
  <p id="resCalc"></p>
</div>

<!-- 📝 TEXTO -->
<div id="txt" class="ventana">
  <div class="barra">
    Notas
    <span class="cerrar" onclick="cerrar('txt')">✖</span>
  </div>
  <textarea style="width:100%; height:150px;"></textarea>
</div>

<!-- 🎨 PAINT -->
<div id="paint" class="ventana">
  <div class="barra">
    Paint
    <span class="cerrar" onclick="cerrar('paint')">✖</span>
  </div>
  <canvas id="canvas" width="250" height="200"></canvas>
</div>

<!-- 🕹️ VENTANA TETRIS -->
<div id="tetris" class="ventana">
  <div class="barra">
    Tetris
    <span class="cerrar" onclick="cerrar('tetris')">✖</span>
  </div>
  <canvas id="tetrisCanvas" width="200" height="400"></canvas>
</div>

<script>
// Abrir ventanas
function abrir(id) {
  document.getElementById(id).style.display = "block";
}

// Cerrar ventanas
function cerrar(id) {
  document.getElementById(id).style.display = "none";
}

// Calculadora
function calcular() {
  let val = document.getElementById("inputCalc").value;
  document.getElementById("resCalc").innerText = eval(val);
}

// Paint
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let dibujando = false;

canvas.onmousedown = () => dibujando = true;
canvas.onmouseup = () => dibujando = false;
canvas.onmousemove = (e) => {
  if (!dibujando) return;
  ctx.fillRect(e.offsetX, e.offsetY, 2, 2);
};

// Música (por si el navegador bloquea autoplay)
document.body.addEventListener("click", () => {
  document.getElementById("musica").play();
});

// =======================
// 🕹️ TETRIS SIMPLE
// =======================
const canvasT = document.getElementById("tetrisCanvas");
const ctxT = canvasT.getContext("2d");

const grid = 20;
let pieza = { x: 4, y: 0, forma: [[1,1],[1,1]] };

function dibujarTetris() {
  ctxT.clearRect(0,0,200,400);

  ctxT.fillStyle = "cyan";
  pieza.forma.forEach((fila, y) => {
    fila.forEach((val, x) => {
      if (val) {
        ctxT.fillRect((pieza.x + x)*grid, (pieza.y + y)*grid, grid, grid);
      }
    });
  });
}

function moverAbajo() {
  pieza.y++;
  if (pieza.y * grid > 380) pieza.y = 0;
}

setInterval(() => {
  moverAbajo();
  dibujarTetris();
}, 500);

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") pieza.x--;
  if (e.key === "ArrowRight") pieza.x++;
});
</script>

</body>
</html>
