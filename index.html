<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<style>
body {
  margin: 0;
  background: url("fondo.jpg") no-repeat center center fixed;
  background-size: cover;
  font-family: Arial;
  overflow: hidden;
}

/* Iconos */
.icono {
  width: 80px;
  text-align: center;
  color: white;
  cursor: pointer;
  position: absolute;
}

.icono img {
  width: 64px;
}

/* Ventanas */
.ventana {
  position: absolute;
  top: 100px;
  left: 100px;
  width: 300px;
  background: rgba(255,255,255,0.7);
  border: 2px solid #00cfff;
  border-radius: 10px;
  backdrop-filter: blur(10px);
  display: none;
  padding: 10px;
}

.barra {
  font-weight: bold;
  margin-bottom: 10px;
  cursor: move;
}

/* Canvas */
canvas {
  background: white;
  border: 1px solid black;
}
</style>

</head>
<body>

<!-- 🎵 Música -->
<audio id="musica" autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 💻 ICONOS -->
<div class="icono" style="top:20px; left:20px;" onclick="abrir('calc')">
  <img src="calc.png">
  <div>Calculadora</div>
</div>

<div class="icono" style="top:120px; left:20px;" onclick="abrir('txt')">
  <img src="txt.png">
  <div>Notas</div>
</div>

<div class="icono" style="top:220px; left:20px;" onclick="abrir('paint')">
  <img src="paint.png">
  <div>Paint</div>
</div>

<!-- 🧮 CALCULADORA -->
<div id="calc" class="ventana">
  <div class="barra">Calculadora</div>
  <input id="inputCalc" placeholder="2+2">
  <button onclick="calcular()">=</button>
  <p id="resCalc"></p>
</div>

<!-- 📝 TEXTO -->
<div id="txt" class="ventana">
  <div class="barra">Notas</div>
  <textarea style="width:100%; height:150px;"></textarea>
</div>

<!-- 🎨 PAINT -->
<div id="paint" class="ventana">
  <div class="barra">Paint</div>
  <canvas id="canvas" width="250" height="200"></canvas>
</div>

<script>
// Abrir ventanas
function abrir(id) {
  document.getElementById(id).style.display = "block";
}

// Calculadora
function calcular() {
  let val = document.getElementById("inputCalc").value;
  document.getElementById("resCalc").innerText = eval(val);
}

// Paint
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let dibujando = false;

canvas.onmousedown = () => dibujando = true;
canvas.onmouseup = () => dibujando = false;
canvas.onmousemove = (e) => {
  if (!dibujando) return;
  ctx.fillRect(e.offsetX, e.offsetY, 2, 2);
};

// Música (por si el navegador bloquea autoplay)
document.body.addEventListener("click", () => {
  document.getElementById("musica").play();
});
</script>

</body>
</html>
